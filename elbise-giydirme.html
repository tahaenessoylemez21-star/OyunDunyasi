<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👗 Elbise Giydirme</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#ff9a9e,#fecfef,#ffecd2);min-height:100vh;font-family:Arial,sans-serif;overflow-x:hidden;user-select:none}
.header{text-align:center;padding:12px;position:relative}
.header h1{font-size:24px;color:white;text-shadow:0 2px 8px rgba(255,100,150,0.5)}
.geri-btn{position:absolute;left:12px;top:12px;background:rgba(255,255,255,0.8);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer}
.oyun{display:flex;flex-direction:column;align-items:center;padding:8px}
#sahne{border-radius:20px;background:linear-gradient(180deg,#ffe0f0,#fff0f8);box-shadow:0 8px 30px rgba(255,100,150,0.3);touch-action:none}
.kategori-butonlar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;justify-content:center}
.kat-btn{background:rgba(255,255,255,0.7);border:2px solid rgba(255,107,157,0.3);border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:bold;color:#ff6b9d;transition:all 0.2s}
.kat-btn.aktif{background:linear-gradient(135deg,#ff6b9d,#ff8cc8);color:white;border-color:transparent}
.esyalar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;background:rgba(255,255,255,0.7);border-radius:16px;padding:10px;width:100%;max-width:400px;max-height:180px;overflow-y:auto}
.esya{background:white;border-radius:12px;padding:8px;text-align:center;cursor:grab;font-size:28px;box-shadow:0 2px 8px rgba(255,100,150,0.15);border:2px solid transparent;transition:all 0.2s;touch-action:none}
.esya:hover{transform:scale(1.1);border-color:#ff6b9d}
.esya.surukle{opacity:0.5;transform:scale(1.2)}
.alt-butonlar{display:flex;gap:8px;margin-top:10px}
.aksiyon-btn{background:linear-gradient(135deg,#ff6b9d,#ff8cc8);border:none;border-radius:20px;padding:10px 18px;color:white;font-size:13px;font-weight:bold;cursor:pointer}
.aksiyon-btn.mor{background:linear-gradient(135deg,#a855f7,#c084fc)}
.aksiyon-btn.yesil{background:linear-gradient(135deg,#34d399,#6ee7b7);color:#065f46}
#foto-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
.foto-cerceve{background:linear-gradient(135deg,#ff9a9e,#fecfef);border-radius:25px;padding:20px;text-align:center}
.foto-baslik{font-size:20px;color:white;font-weight:bold;margin-bottom:10px}
.foto-btn-grup{display:flex;gap:10px;margin-top:15px;justify-content:center}
.surukle-hayalet{position:fixed;pointer-events:none;z-index:999;font-size:36px;transform:translate(-50%,-50%);display:none}
</style>
</head>
<body>

<div class="header">
  <button class="geri-btn" onclick="window.location.href='index.html'">🏠</button>
  <h1>👗 Elbise Giydirme</h1>
</div>

<div class="oyun">
  <canvas id="sahne" width="340" height="320"></canvas>

  <div class="kategori-butonlar">
    <button class="kat-btn aktif" onclick="kategoriSec('elbise',this)">👗 Elbise</button>
    <button class="kat-btn" onclick="kategoriSec('ust',this)">👚 Üst</button>
    <button class="kat-btn" onclick="kategoriSec('aksesuar',this)">💍 Takı</button>
    <button class="kat-btn" onclick="kategoriSec('makyaj',this)">💄 Makyaj</button>
    <button class="kat-btn" onclick="kategoriSec('ayakkabi',this)">👠 Ayakkabı</button>
  </div>

  <div class="esyalar" id="esya-listesi"></div>

  <div class="alt-butonlar">
    <button class="aksiyon-btn mor" onclick="temizle()">🗑️ Temizle</button>
    <button class="aksiyon-btn" onclick="fotoCek()">📸 Fotoğraf</button>
    <button class="aksiyon-btn yesil" onclick="rastgele()">🎲 Rastgele</button>
  </div>
</div>

<div id="foto-modal">
  <div class="foto-cerceve">
    <div class="foto-baslik">✨ Harika Görünüyorsun! ✨</div>
    <canvas id="foto-canvas" width="280" height="320" style="border-radius:15px"></canvas>
    <div class="foto-btn-grup">
      <button class="aksiyon-btn" onclick="document.getElementById('foto-modal').style.display='none'">💗 Kapat</button>
    </div>
  </div>
</div>

<div class="surukle-hayalet" id="hayalet"></div>

<script>
const canvas=document.getElementById('sahne');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;

// Koyulan eşyalar
let koyulanlar=[];
let surukleEsya=null;
let surukleX=0,surukleY=0;

const kategoriler={
  elbise:[
    {emoji:'👗',isim:'Elbise'},{emoji:'👘',isim:'Kimono'},
    {emoji:'🥻',isim:'Sari'},{emoji:'🩱',isim:'Mayo'},
    {emoji:'🩴',isim:'Etek'},{emoji:'🎀',isim:'Fiyonk'},
  ],
  ust:[
    {emoji:'👚',isim:'Tişört'},{emoji:'🧥',isim:'Ceket'},
    {emoji:'🥼',isim:'Önlük'},{emoji:'👕',isim:'Kazak'},
    {emoji:'🧣',isim:'Atkı'},{emoji:'🧤',isim:'Eldiven'},
  ],
  aksesuar:[
    {emoji:'👑',isim:'Taç'},{emoji:'💍',isim:'Yüzük'},
    {emoji:'📿',isim:'Kolye'},{emoji:'💎',isim:'Elmas'},
    {emoji:'🌸',isim:'Çiçek'},{emoji:'⭐',isim:'Yıldız'},
    {emoji:'🦋',isim:'Kelebek'},{emoji:'🌈',isim:'Gökkuşağı'},
    {emoji:'💫',isim:'Parıltı'},{emoji:'🌙',isim:'Ay'},
  ],
  makyaj:[
    {emoji:'💄',isim:'Ruj'},{emoji:'💅',isim:'Oje'},
    {emoji:'👄',isim:'Dudak'},{emoji:'💋',isim:'Öpücük'},
    {emoji:'✨',isim:'Işıltı'},{emoji:'🌹',isim:'Allık'},
    {emoji:'🎨',isim:'Makyaj'},{emoji:'💗',isim:'Kalp'},
  ],
  ayakkabi:[
    {emoji:'👠',isim:'Topuklu'},{emoji:'👡',isim:'Sandalet'},
    {emoji:'👢',isim:'Bot'},{emoji:'🩰',isim:'Bale'},
    {emoji:'👟',isim:'Spor'},{emoji:'🥿',isim:'Loafer'},
  ],
};

// Kız çiz
function kizCiz(){
  ctx.clearRect(0,0,W,H);

  // Arkaplan
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#ffe0f0');bg.addColorStop(1,'#fff0f8');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Zemin
  ctx.fillStyle='#ffd6e7';
  ctx.fillRect(0,H-40,W,40);
  ctx.fillStyle='#ffb3d1';
  ctx.fillRect(0,H-42,W,4);

  const cx=W/2,cy=H/2-20;

  // BACAKLAR
  ctx.strokeStyle='#f4c2a1';ctx.lineWidth=18;ctx.lineCap='round';
  // Sol bacak
  ctx.beginPath();ctx.moveTo(cx-22,cy+55);ctx.lineTo(cx-28,cy+110);ctx.stroke();
  // Sağ bacak
  ctx.beginPath();ctx.moveTo(cx+22,cy+55);ctx.lineTo(cx+28,cy+110);ctx.stroke();
  // Ayaklar
  ctx.strokeStyle='#e8a882';ctx.lineWidth=14;
  ctx.beginPath();ctx.moveTo(cx-28,cy+110);ctx.lineTo(cx-38,cy+115);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+28,cy+110);ctx.lineTo(cx+38,cy+115);ctx.stroke();

  // GÖVDE - bikini altı
  ctx.fillStyle='#ff6b9d';
  ctx.beginPath();ctx.ellipse(cx,cy+45,28,18,0,0,Math.PI*2);ctx.fill();
  // Bikini altı detay
  ctx.fillStyle='#ff4785';
  ctx.fillRect(cx-28,cy+38,56,8);

  // GÖVDE
  const govdeGrad=ctx.createLinearGradient(cx-35,cy-40,cx+35,cy+60);
  govdeGrad.addColorStop(0,'#f9c4a0');govdeGrad.addColorStop(1,'#f4a57a');
  ctx.fillStyle=govdeGrad;
  ctx.beginPath();ctx.ellipse(cx,cy+10,32,50,0,0,Math.PI*2);ctx.fill();

  // BİKİNİ ÜST
  ctx.fillStyle='#ff6b9d';
  // Sol fincan
  ctx.beginPath();ctx.ellipse(cx-13,cy-15,14,11,0.3,0,Math.PI*2);ctx.fill();
  // Sağ fincan
  ctx.beginPath();ctx.ellipse(cx+13,cy-15,14,11,-0.3,0,Math.PI*2);ctx.fill();
  // Bikini bağı ortası
  ctx.fillStyle='#ff4785';
  ctx.beginPath();ctx.arc(cx,cy-18,4,0,Math.PI*2);ctx.fill();
  // Omuz bağları
  ctx.strokeStyle='#ff4785';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-13,cy-24);ctx.lineTo(cx-30,cy-55);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+13,cy-24);ctx.lineTo(cx+30,cy-55);ctx.stroke();

  // KOLLAR
  ctx.strokeStyle='#f4c2a1';ctx.lineWidth=16;ctx.lineCap='round';
  // Sol kol
  ctx.beginPath();ctx.moveTo(cx-30,cy-30);ctx.quadraticCurveTo(cx-65,cy-10,cx-60,cy+30);ctx.stroke();
  // Sağ kol
  ctx.beginPath();ctx.moveTo(cx+30,cy-30);ctx.quadraticCurveTo(cx+65,cy-10,cx+60,cy+30);ctx.stroke();
  // Eller
  ctx.fillStyle='#f4c2a1';
  ctx.beginPath();ctx.arc(cx-60,cy+33,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+60,cy+33,8,0,Math.PI*2);ctx.fill();

  // BOYUN
  ctx.fillStyle='#f4c2a1';
  ctx.beginPath();ctx.ellipse(cx,cy-42,10,14,0,0,Math.PI*2);ctx.fill();

  // BAŞ
  const basGrad=ctx.createRadialGradient(cx-5,cy-75,5,cx,cy-70,35);
  basGrad.addColorStop(0,'#fde8c8');basGrad.addColorStop(1,'#f4c2a1');
  ctx.fillStyle=basGrad;
  ctx.beginPath();ctx.ellipse(cx,cy-72,32,36,0,0,Math.PI*2);ctx.fill();

  // SAÇ - Arka
  ctx.fillStyle='#8B4513';
  ctx.beginPath();ctx.ellipse(cx,cy-75,34,38,0,0,Math.PI*2);ctx.fill();
  // Uzun saç
  ctx.beginPath();ctx.moveTo(cx-34,cy-65);ctx.quadraticCurveTo(cx-45,cy-10,cx-38,cy+20);ctx.quadraticCurveTo(cx-35,cy+40,cx-25,cy+50);ctx.lineTo(cx-15,cy+45);ctx.quadraticCurveTo(cx-20,cy+20,cx-30,cy-10);ctx.quadraticCurveTo(cx-38,cy-40,cx-32,cy-65);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+34,cy-65);ctx.quadraticCurveTo(cx+45,cy-10,cx+38,cy+20);ctx.quadraticCurveTo(cx+35,cy+40,cx+25,cy+50);ctx.lineTo(cx+15,cy+45);ctx.quadraticCurveTo(cx+20,cy+20,cx+30,cy-10);ctx.quadraticCurveTo(cx+38,cy-40,cx+32,cy-65);ctx.fill();

  // Yüz
  ctx.fillStyle='#fde8c8';
  ctx.beginPath();ctx.ellipse(cx,cy-72,30,34,0,0,Math.PI*2);ctx.fill();

  // SAÇ - Ön
  ctx.fillStyle='#8B4513';
  ctx.beginPath();ctx.ellipse(cx,cy-100,32,12,0,0,Math.PI);ctx.fill();
  // Perçem
  ctx.beginPath();ctx.moveTo(cx-20,cy-95);ctx.quadraticCurveTo(cx-10,cy-80,cx-5,cy-85);ctx.quadraticCurveTo(cx,cy-75,cx+5,cy-82);ctx.quadraticCurveTo(cx+12,cy-78,cx+18,cy-92);ctx.fill();

  // GÖZLER
  // Göz beyazı
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(cx-11,cy-72,9,7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+11,cy-72,9,7,0,0,Math.PI*2);ctx.fill();
  // Göz rengi
  ctx.fillStyle='#4a90d9';
  ctx.beginPath();ctx.arc(cx-11,cy-72,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+11,cy-72,5,0,Math.PI*2);ctx.fill();
  // Göz bebekleri
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(cx-11,cy-72,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+11,cy-72,3,0,Math.PI*2);ctx.fill();
  // Parıltı
  ctx.fillStyle='white';
  ctx.beginPath();ctx.arc(cx-9,cy-74,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+13,cy-74,1.5,0,Math.PI*2);ctx.fill();
  // Kirpikler
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;
  [[-16,-78],[-11,-79],[-6,-77]].forEach(([ex,ey])=>{ctx.beginPath();ctx.moveTo(cx+ex,cy-72);ctx.lineTo(cx+ex,cy+ey);ctx.stroke();});
  [[6,-78],[11,-79],[16,-77]].forEach(([ex,ey])=>{ctx.beginPath();ctx.moveTo(cx+ex,cy-72);ctx.lineTo(cx+ex,cy+ey);ctx.stroke();});
  // Kaşlar
  ctx.strokeStyle='#5c3317';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-17,cy-82);ctx.quadraticCurveTo(cx-11,cy-85,cx-5,cy-82);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+5,cy-82);ctx.quadraticCurveTo(cx+11,cy-85,cx+17,cy-82);ctx.stroke();

  // BURUN
  ctx.strokeStyle='#e8a882';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-3,cy-65);ctx.lineTo(cx-4,cy-60);ctx.lineTo(cx-1,cy-59);ctx.stroke();

  // DUDAKLAR
  ctx.fillStyle='#ff6b9d';
  ctx.beginPath();ctx.ellipse(cx,cy-55,9,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff4785';
  ctx.beginPath();ctx.ellipse(cx,cy-54,9,3,0,0,Math.PI);ctx.fill();

  // ALLAK
  ctx.fillStyle='rgba(255,150,170,0.3)';
  ctx.beginPath();ctx.ellipse(cx-20,cy-62,9,5,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+20,cy-62,9,5,-0.3,0,Math.PI*2);ctx.fill();

  // Koyulan eşyalar çiz
  koyulanlar.forEach(k=>{
    ctx.font=k.boyut+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(k.emoji,k.x,k.y);
  });
}

// Kategori seçimi
function kategoriSec(kat,btn){
  document.querySelectorAll('.kat-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  const liste=document.getElementById('esya-listesi');
  liste.innerHTML=kategoriler[kat].map(e=>`
    <div class="esya" data-emoji="${e.emoji}" data-isim="${e.isim}" 
      ontouchstart="surukleBasla(event,'${e.emoji}')"
      onmousedown="surukleBaslaFare(event,'${e.emoji}')">
      ${e.emoji}
    </div>
  `).join('');
}

// Sürükleme - Dokunmatik
const hayalet=document.getElementById('hayalet');
let aktifSurukleme=false;

function surukleBasla(e,emoji){
  e.preventDefault();
  aktifSurukleme=true;
  surukleEsya=emoji;
  hayalet.textContent=emoji;
  hayalet.style.display='block';
  const t=e.touches[0];
  hayalet.style.left=t.clientX+'px';
  hayalet.style.top=t.clientY+'px';
}

function surukleBaslaFare(e,emoji){
  e.preventDefault();
  aktifSurukleme=true;
  surukleEsya=emoji;
  hayalet.textContent=emoji;
  hayalet.style.display='block';
  hayalet.style.left=e.clientX+'px';
  hayalet.style.top=e.clientY+'px';
}

document.addEventListener('touchmove',e=>{
  if(!aktifSurukleme)return;
  e.preventDefault();
  const t=e.touches[0];
  hayalet.style.left=t.clientX+'px';
  hayalet.style.top=t.clientY+'px';
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!aktifSurukleme)return;
  aktifSurukleme=false;
  hayalet.style.display='none';
  const t=e.changedTouches[0];
  birak(t.clientX,t.clientY);
});

document.addEventListener('mousemove',e=>{
  if(!aktifSurukleme)return;
  hayalet.style.left=e.clientX+'px';
  hayalet.style.top=e.clientY+'px';
});

document.addEventListener('mouseup',e=>{
  if(!aktifSurukleme)return;
  aktifSurukleme=false;
  hayalet.style.display='none';
  birak(e.clientX,e.clientY);
});

function birak(clientX,clientY){
  if(!surukleEsya)return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  const scaleY=H/rect.height;
  const x=(clientX-rect.left)*scaleX;
  const y=(clientY-rect.top)*scaleY;
  if(x>=0&&x<=W&&y>=0&&y<=H){
    koyulanlar.push({emoji:surukleEsya,x:x,y:y,boyut:50});
    kizCiz();
  }
  surukleEsya=null;
}

// Temizle
function temizle(){
  koyulanlar=[];
  kizCiz();
}

// Rastgele
function rastgele(){
  koyulanlar=[];
  const katAdi=Object.keys(kategoriler);
  katAdi.forEach(kat=>{
    const esyalar=kategoriler[kat];
    const e=esyalar[Math.floor(Math.random()*esyalar.length)];
    const pozisyonlar={
      elbise:{x:W/2,y:H/2+30},
      ust:{x:W/2,y:H/2-20},
      aksesuar:{x:W/2,y:H/2-90},
      makyaj:{x:W/2+15,y:H/2-65},
      ayakkabi:{x:W/2,y:H/2+110}
    };
    const poz=pozisyonlar[kat]||{x:W/2,y:H/2};
    koyulanlar.push({emoji:e.emoji,x:poz.x,y:poz.y,boyut:50});
  });
  kizCiz();
}

// Fotoğraf çek
function fotoCek(){
  const fotoCanvas=document.getElementById('foto-canvas');
  const fotoCtx=fotoCanvas.getContext('2d');
  fotoCtx.drawImage(canvas,0,0,280,320);
  // Çerçeve ekle
  fotoCtx.strokeStyle='#ff6b9d';
  fotoCtx.lineWidth=6;
  fotoCtx.strokeRect(3,3,274,314);
  // Yıldızlar ekle
  fotoCtx.font='20px serif';
  ['✨','💗','⭐','💫'].forEach((e,i)=>{
    fotoCtx.fillText(e,10+i*65,20);
  });
  document.getElementById('foto-modal').style.display='flex';
}

// Başlangıç
kategoriSec('elbise',document.querySelector('.kat-btn'));
kizCiz();
</script>
</body>
</html>
