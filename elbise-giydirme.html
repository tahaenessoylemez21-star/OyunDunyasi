<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👗 Elbise Giydirme</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#ff9a9e,#fecfef,#ffecd2);min-height:100vh;font-family:Arial,sans-serif;overflow-x:hidden}
.header{text-align:center;padding:12px;position:relative}
.header h1{font-size:22px;color:white;text-shadow:0 2px 8px rgba(255,100,150,0.5)}
.geri-btn{position:absolute;left:12px;top:12px;background:rgba(255,255,255,0.8);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer}
.oyun{display:flex;flex-direction:row;gap:10px;padding:8px;max-width:700px;margin:0 auto;align-items:flex-start}
@media(max-width:500px){.oyun{flex-direction:column;align-items:center}}
.karakter-alan{background:rgba(255,255,255,0.4);border-radius:20px;padding:10px;flex-shrink:0}
.secim-alan{flex:1;min-width:0}
.kat-butonlar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.kat-btn{background:rgba(255,255,255,0.7);border:2px solid rgba(255,107,157,0.3);border-radius:15px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:bold;color:#ff6b9d;transition:all 0.2s}
.kat-btn.aktif{background:linear-gradient(135deg,#ff6b9d,#ff8cc8);color:white;border-color:transparent}
.secim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:300px;overflow-y:auto}
.secim-kart{background:white;border-radius:12px;padding:8px;text-align:center;cursor:pointer;border:3px solid transparent;transition:all 0.2s;box-shadow:0 2px 8px rgba(255,100,150,0.1)}
.secim-kart:hover{transform:scale(1.05);border-color:#ff6b9d}
.secim-kart.aktif{border-color:#ff6b9d;background:#fff0f5}
.secim-kart svg{width:60px;height:60px}
.secim-kart .isim{font-size:10px;color:#ff6b9d;font-weight:bold;margin-top:4px}
.renk-secici{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0}
.renk-btn{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.2s}
.renk-btn.aktif{border-color:#333;transform:scale(1.2)}
.alt-butonlar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.aksiyon-btn{background:linear-gradient(135deg,#ff6b9d,#ff8cc8);border:none;border-radius:15px;padding:8px 15px;color:white;font-size:12px;font-weight:bold;cursor:pointer}
.aksiyon-btn.mor{background:linear-gradient(135deg,#a855f7,#c084fc)}
#foto-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column}
.foto-cerceve{background:linear-gradient(135deg,#ff9a9e,#fecfef);border-radius:25px;padding:20px;text-align:center;max-width:320px}
.foto-baslik{font-size:18px;color:white;font-weight:bold;margin-bottom:10px}
.foto-btn-grup{display:flex;gap:10px;margin-top:15px;justify-content:center}
</style>
</head>
<body>
<div class="header">
  <button class="geri-btn" onclick="window.location.href='index.html'">🏠</button>
  <h1>👗 Elbise Giydirme</h1>
</div>

<div class="oyun">
  <!-- Karakter -->
  <div class="karakter-alan">
    <svg id="karakter-svg" width="200" height="380" viewBox="0 0 200 380">
      <!-- Arkaplan -->
      <defs>
        <radialGradient id="ciltGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" style="stop-color:#fde8c8"/>
          <stop offset="100%" style="stop-color:#f4c2a1"/>
        </radialGradient>
        <radialGradient id="basGrad" cx="40%" cy="30%" r="70%">
          <stop offset="0%" style="stop-color:#fde8c8"/>
          <stop offset="100%" style="stop-color:#f0b48a"/>
        </radialGradient>
      </defs>

      <!-- BACAKLAR -->
      <line x1="85" y1="280" x2="78" y2="360" stroke="#f4c2a1" stroke-width="18" stroke-linecap="round"/>
      <line x1="115" y1="280" x2="122" y2="360" stroke="#f4c2a1" stroke-width="18" stroke-linecap="round"/>
      <!-- Ayaklar -->
      <ellipse id="ayak-sol" cx="72" cy="363" rx="12" ry="7" fill="#f4c2a1"/>
      <ellipse id="ayak-sag" cx="128" cy="363" rx="12" ry="7" fill="#f4c2a1"/>

      <!-- ELBİSE KATMANI - ALTTA -->
      <g id="elbise-katman">
        <!-- Varsayılan bikini -->
        <ellipse cx="100" cy="268" rx="28" ry="16" fill="#ff6b9d"/>
        <rect x="72" y="260" width="56" height="8" fill="#ff4785" rx="4"/>
        <ellipse cx="87" cy="185" rx="14" ry="11" fill="#ff6b9d" transform="rotate(15,87,185)"/>
        <ellipse cx="113" cy="185" rx="14" ry="11" fill="#ff6b9d" transform="rotate(-15,113,185)"/>
        <circle cx="100" cy="180" r="4" fill="#ff4785"/>
        <line x1="87" y1="175" x2="72" y2="145" stroke="#ff4785" stroke-width="3"/>
        <line x1="113" y1="175" x2="128" y2="145" stroke="#ff4785" stroke-width="3"/>
      </g>

      <!-- GÖVDE -->
      <ellipse cx="100" cy="230" rx="35" ry="55" fill="url(#ciltGrad)"/>

      <!-- KOLLAR -->
      <path d="M68,190 Q35,210 32,245" stroke="#f4c2a1" stroke-width="16" fill="none" stroke-linecap="round"/>
      <path d="M132,190 Q165,210 168,245" stroke="#f4c2a1" stroke-width="16" fill="none" stroke-linecap="round"/>
      <circle cx="31" cy="247" r="9" fill="#f4c2a1"/>
      <circle cx="169" cy="247" r="9" fill="#f4c2a1"/>

      <!-- BOYUN -->
      <ellipse cx="100" cy="162" rx="11" ry="15" fill="#f4c2a1"/>

      <!-- BAŞ -->
      <!-- Saç arka -->
      <ellipse id="sac-arka" cx="100" cy="105" rx="48" ry="52" fill="#8B4513"/>
      <!-- Uzun saç sol -->
      <path id="sac-sol" d="M55,100 Q40,150 45,220 Q48,240 58,245 L65,238 Q58,210 60,160 Q65,120 58,100Z" fill="#8B4513"/>
      <!-- Uzun saç sağ -->
      <path id="sac-sag" d="M145,100 Q160,150 155,220 Q152,240 142,245 L135,238 Q142,210 140,160 Q135,120 142,100Z" fill="#8B4513"/>

      <!-- YÜZ -->
      <ellipse cx="100" cy="108" rx="38" ry="44" fill="url(#basGrad)"/>

      <!-- Saç ön -->
      <ellipse id="sac-on" cx="100" cy="68" rx="40" ry="14" fill="#8B4513"/>
      <!-- Perçem -->
      <path id="percemYol" d="M62,72 Q75,58 85,68 Q92,58 100,65 Q108,55 118,65 Q128,56 138,70" stroke="#8B4513" stroke-width="8" fill="none" stroke-linecap="round"/>

      <!-- AKSESUAR KATMANI -->
      <g id="aksesuar-katman"></g>

      <!-- GÖZLER -->
      <!-- Sol göz -->
      <ellipse cx="84" cy="102" rx="11" ry="9" fill="white"/>
      <circle cx="84" cy="103" r="6" fill="#4a90d9"/>
      <circle cx="84" cy="103" r="4" fill="#1a1a2e"/>
      <circle cx="86" cy="100" r="2" fill="white"/>
      <!-- Sağ göz -->
      <ellipse cx="116" cy="102" rx="11" ry="9" fill="white"/>
      <circle cx="116" cy="103" r="6" fill="#4a90d9"/>
      <circle cx="116" cy="103" r="4" fill="#1a1a2e"/>
      <circle cx="118" cy="100" r="2" fill="white"/>
      <!-- Kirpikler -->
      <g id="kirpik-katman" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round">
        <line x1="76" y1="94" x2="74" y2="89"/>
        <line x1="81" y1="92" x2="80" y2="87"/>
        <line x1="87" y1="92" x2="87" y2="87"/>
        <line x1="93" y1="94" x2="95" y2="89"/>
        <line x1="107" y1="94" x2="105" y2="89"/>
        <line x1="113" y1="92" x2="112" y2="87"/>
        <line x1="119" y1="92" x2="120" y2="87"/>
        <line x1="124" y1="94" x2="126" y2="89"/>
      </g>
      <!-- Kaşlar -->
      <path d="M74,90 Q84,85 93,89" stroke="#5c3317" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M107,89 Q116,85 126,90" stroke="#5c3317" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- ALLAK -->
      <ellipse id="allak-sol" cx="72" cy="115" rx="12" ry="7" fill="rgba(255,150,170,0.35)" transform="rotate(-10,72,115)"/>
      <ellipse id="allak-sag" cx="128" cy="115" rx="12" ry="7" fill="rgba(255,150,170,0.35)" transform="rotate(10,128,115)"/>

      <!-- BURUN -->
      <path d="M97,115 L95,122 L100,124 L105,122 L103,115" stroke="#e8a882" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- DUDAKLAR -->
      <g id="dudak-katman">
        <path d="M88,132 Q100,138 112,132" stroke="#ff6b9d" stroke-width="2" fill="none"/>
        <ellipse cx="100" cy="133" rx="12" ry="6" fill="#ff6b9d" opacity="0.8"/>
        <path d="M88,133 Q100,128 112,133" fill="#ff4785" opacity="0.6"/>
      </g>

      <!-- MAKYAJ KATMANI -->
      <g id="makyaj-katman"></g>

      <!-- TAÇ/AKSESUAR ÜST -->
      <g id="tac-katman"></g>
    </svg>
  </div>

  <!-- Seçim Paneli -->
  <div class="secim-alan">
    <div class="kat-butonlar">
      <button class="kat-btn aktif" onclick="kat('elbise',this)">👗 Elbise</button>
      <button class="kat-btn" onclick="kat('sac',this)">💇 Saç</button>
      <button class="kat-btn" onclick="kat('makyaj',this)">💄 Makyaj</button>
      <button class="kat-btn" onclick="kat('aksesuar',this)">👑 Aksesuar</button>
    </div>

    <!-- Elbise -->
    <div id="panel-elbise" class="secim-grid">
      <div class="secim-kart aktif" onclick="elbiseSec(0,this)">
        <svg viewBox="0 0 60 60"><ellipse cx="30" cy="38" rx="18" ry="12" fill="#ff6b9d"/><ellipse cx="22" cy="22" rx="9" ry="7" fill="#ff6b9d" transform="rotate(15,22,22)"/><ellipse cx="38" cy="22" rx="9" ry="7" fill="#ff6b9d" transform="rotate(-15,38,22)"/></svg>
        <div class="isim">Bikini</div>
      </div>
      <div class="secim-kart" onclick="elbiseSec(1,this)">
        <svg viewBox="0 0 60 60"><path d="M15,15 L10,55 L50,55 L45,15 Q35,8 30,10 Q25,8 15,15Z" fill="#9b59b6"/><path d="M15,15 Q20,20 30,18 Q40,20 45,15" fill="#8e44ad"/></svg>
        <div class="isim">Prenses</div>
      </div>
      <div class="secim-kart" onclick="elbiseSec(2,this)">
        <svg viewBox="0 0 60 60"><rect x="12" y="12" width="36" height="43" rx="5" fill="#3498db"/><rect x="8" y="12" width="44" height="8" rx="4" fill="#2980b9"/><rect x="20" y="30" width="20" height="2" fill="white" opacity="0.5"/><rect x="20" y="36" width="20" height="2" fill="white" opacity="0.5"/></svg>
        <div class="isim">Günlük</div>
      </div>
      <div class="secim-kart" onclick="elbiseSec(3,this)">
        <svg viewBox="0 0 60 60"><rect x="15" y="10" width="30" height="20" rx="5" fill="#e74c3c"/><rect x="10" y="30" width="40" height="25" rx="5" fill="#2c3e50"/><rect x="8" y="8" width="12" height="25" rx="4" fill="#e74c3c"/><rect x="40" y="8" width="12" height="25" rx="4" fill="#e74c3c"/></svg>
        <div class="isim">Spor</div>
      </div>
      <div class="secim-kart" onclick="elbiseSec(4,this)">
        <svg viewBox="0 0 60 60"><path d="M20,10 L10,55 L50,55 L40,10 Q35,5 30,7 Q25,5 20,10Z" fill="#f1c40f"/><path d="M10,30 Q30,25 50,30" stroke="#f39c12" stroke-width="2" fill="none"/><circle cx="30" cy="18" r="4" fill="#f39c12"/></svg>
        <div class="isim">Parti</div>
      </div>
    </div>

    <!-- Saç -->
    <div id="panel-sac" style="display:none">
      <div style="font-size:12px;color:#ff6b9d;font-weight:bold;margin-bottom:6px">Saç Rengi:</div>
      <div class="renk-secici">
        <div class="renk-btn aktif" style="background:#8B4513" onclick="sacRengi('#8B4513','#7a3b10',this)"></div>
        <div class="renk-btn" style="background:#1a1a1a" onclick="sacRengi('#1a1a1a','#111',this)"></div>
        <div class="renk-btn" style="background:#FFD700" onclick="sacRengi('#FFD700','#FFC200',this)"></div>
        <div class="renk-btn" style="background:#FF6B6B" onclick="sacRengi('#FF6B6B','#ff4444',this)"></div>
        <div class="renk-btn" style="background:#9B59B6" onclick="sacRengi('#9B59B6','#7d3c98',this)"></div>
        <div class="renk-btn" style="background:#1ABC9C" onclick="sacRengi('#1ABC9C','#17a589',this)"></div>
        <div class="renk-btn" style="background:#FF69B4" onclick="sacRengi('#FF69B4','#ff4da6',this)"></div>
        <div class="renk-btn" style="background:#F5F5F5;border:1px solid #ddd" onclick="sacRengi('#F5F5F5','#e0e0e0',this)"></div>
      </div>
      <div style="font-size:12px;color:#ff6b9d;font-weight:bold;margin:8px 0 6px">Saç Stili:</div>
      <div class="secim-grid">
        <div class="secim-kart aktif" onclick="sacStil('uzun',this)">
          <svg viewBox="0 0 60 60"><ellipse cx="30" cy="20" rx="22" ry="18" fill="#8B4513"/><path d="M10,25 Q5,45 12,58 L18,55 Q14,42 18,28Z" fill="#8B4513"/><path d="M50,25 Q55,45 48,58 L42,55 Q46,42 42,28Z" fill="#8B4513"/></svg>
          <div class="isim">Uzun</div>
        </div>
        <div class="secim-kart" onclick="sacStil('kisa',this)">
          <svg viewBox="0 0 60 60"><ellipse cx="30" cy="25" rx="22" ry="20" fill="#8B4513"/><path d="M10,28 Q8,38 12,42 L16,40 Q13,35 15,28Z" fill="#8B4513"/><path d="M50,28 Q52,38 48,42 L44,40 Q47,35 45,28Z" fill="#8B4513"/></svg>
          <div class="isim">Kısa</div>
        </div>
        <div class="secim-kart" onclick="sacStil('bukle',this)">
          <svg viewBox="0 0 60 60"><ellipse cx="30" cy="20" rx="22" ry="18" fill="#8B4513"/><path d="M10,25 Q2,38 8,48 Q12,55 10,60 L16,58 Q20,50 14,42 Q10,35 16,28Z" fill="#8B4513"/><path d="M50,25 Q58,38 52,48 Q48,55 50,60 L44,58 Q40,50 46,42 Q50,35 44,28Z" fill="#8B4513"/></svg>
          <div class="isim">Büklüm</div>
        </div>
      </div>
    </div>

    <!-- Makyaj -->
    <div id="panel-makyaj" style="display:none">
      <div style="font-size:12px;color:#ff6b9d;font-weight:bold;margin-bottom:6px">Ruj Rengi:</div>
      <div class="renk-secici">
        <div class="renk-btn aktif" style="background:#ff6b9d" onclick="rujRengi('#ff6b9d','#ff4785',this)"></div>
        <div class="renk-btn" style="background:#c0392b" onclick="rujRengi('#c0392b','#a93226',this)"></div>
        <div class="renk-btn" style="background:#e91e8c" onclick="rujRengi('#e91e8c','#c2185b',this)"></div>
        <div class="renk-btn" style="background:#ff7f50" onclick="rujRengi('#ff7f50','#ff6347',this)"></div>
        <div class="renk-btn" style="background:#9b59b6" onclick="rujRengi('#9b59b6','#7d3c98',this)"></div>
        <div class="renk-btn" style="background:#ffc0cb" onclick="rujRengi('#ffc0cb','#ffb6c1',this)"></div>
      </div>
      <div style="font-size:12px;color:#ff6b9d;font-weight:bold;margin:8px 0 6px">Göz Farı:</div>
      <div class="renk-secici">
        <div class="renk-btn" style="background:transparent;border:2px dashed #ff6b9d" onclick="gozFari('none',this)"></div>
        <div class="renk-btn" style="background:#9b59b6" onclick="gozFari('#9b59b6',this)"></div>
        <div class="renk-btn" style="background:#3498db" onclick="gozFari('#3498db',this)"></div>
        <div class="renk-btn" style="background:#e74c3c" onclick="gozFari('#e74c3c',this)"></div>
        <div class="renk-btn" style="background:#27ae60" onclick="gozFari('#27ae60',this)"></div>
        <div class="renk-btn" style="background:#f39c12" onclick="gozFari('#f39c12',this)"></div>
      </div>
      <div style="font-size:12px;color:#ff6b9d;font-weight:bold;margin:8px 0 6px">Allık:</div>
      <div class="renk-secici">
        <div class="renk-btn aktif" style="background:rgba(255,150,170,0.5)" onclick="allakRengi('rgba(255,150,170,0.35)',this)"></div>
        <div class="renk-btn" style="background:rgba(255,100,100,0.5)" onclick="allakRengi('rgba(255,100,100,0.4)',this)"></div>
        <div class="renk-btn" style="background:rgba(255,180,100,0.5)" onclick="allakRengi('rgba(255,180,100,0.35)',this)"></div>
        <div class="renk-btn" style="background:transparent;border:2px dashed #ff6b9d" onclick="allakRengi('none',this)"></div>
      </div>
    </div>

    <!-- Aksesuar -->
    <div id="panel-aksesuar" style="display:none" class="secim-grid">
      <div class="secim-kart aktif" onclick="aksesuarSec(0,this)">
        <svg viewBox="0 0 60 60"><text x="30" y="40" text-anchor="middle" font-size="35">👑</text></svg>
        <div class="isim">Taç</div>
      </div>
      <div class="secim-kart" onclick="aksesuarSec(1,this)">
        <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="18" fill="none" stroke="#ffd700" stroke-width="4"/><circle cx="30" cy="12" r="5" fill="#ffd700"/></svg>
        <div class="isim">Kolye</div>
      </div>
      <div class="secim-kart" onclick="aksesuarSec(2,this)">
        <svg viewBox="0 0 60 60"><text x="30" y="40" text-anchor="middle" font-size="35">🎀</text></svg>
        <div class="isim">Fiyonk</div>
      </div>
      <div class="secim-kart" onclick="aksesuarSec(3,this)">
        <svg viewBox="0 0 60 60"><text x="30" y="40" text-anchor="middle" font-size="35">🌸</text></svg>
        <div class="isim">Çiçek</div>
      </div>
      <div class="secim-kart" onclick="aksesuarSec(4,this)">
        <svg viewBox="0 0 60 60"><text x="30" y="40" text-anchor="middle" font-size="35">💎</text></svg>
        <div class="isim">Küpe</div>
      </div>
      <div class="secim-kart" onclick="aksesuarSec(-1,this)">
        <svg viewBox="0 0 60 60"><text x="30" y="40" text-anchor="middle" font-size="35">🚫</text></svg>
        <div class="isim">Yok</div>
      </div>
    </div>

    <div class="alt-butonlar">
      <button class="aksiyon-btn mor" onclick="temizle()">🗑️ Temizle</button>
      <button class="aksiyon-btn" onclick="fotoCek()">📸 Fotoğraf</button>
    </div>
  </div>
</div>

<!-- Fotoğraf Modal -->
<div id="foto-modal">
  <div class="foto-cerceve">
    <div class="foto-baslik">✨ Harika Görünüyorsun! ✨</div>
    <div id="foto-icerik" style="font-size:14px;color:white;margin:10px 0;padding:15px;background:rgba(255,255,255,0.2);border-radius:15px">
      Karakterin kaydedildi! 💗
    </div>
    <div class="foto-btn-grup">
      <button class="aksiyon-btn" onclick="document.getElementById('foto-modal').style.display='none'">💗 Kapat</button>
    </div>
  </div>
</div>

<script>
const elbiseler=[
  // 0: Bikini
  `<ellipse cx="100" cy="268" rx="28" ry="16" fill="#ff6b9d"/>
   <rect x="72" y="260" width="56" height="8" fill="#ff4785" rx="4"/>
   <ellipse cx="87" cy="185" rx="14" ry="11" fill="#ff6b9d" transform="rotate(15,87,185)"/>
   <ellipse cx="113" cy="185" rx="14" ry="11" fill="#ff6b9d" transform="rotate(-15,113,185)"/>
   <circle cx="100" cy="180" r="4" fill="#ff4785"/>
   <line x1="87" y1="175" x2="72" y2="145" stroke="#ff4785" stroke-width="3"/>
   <line x1="113" y1="175" x2="128" y2="145" stroke="#ff4785" stroke-width="3"/>`,
  // 1: Prenses
  `<path d="M65,155 L55,340 L145,340 L135,155 Q118,145 100,148 Q82,145 65,155Z" fill="#9b59b6" opacity="0.95"/>
   <path d="M65,155 Q82,168 100,165 Q118,168 135,155" fill="#8e44ad"/>
   <path d="M55,280 Q100,265 145,280 Q100,295 55,280Z" fill="#8e44ad" opacity="0.5"/>
   <path d="M55,310 Q100,295 145,310 Q100,325 55,310Z" fill="#8e44ad" opacity="0.5"/>
   <ellipse cx="100" cy="158" rx="18" ry="8" fill="#c39bd3"/>`,
  // 2: Günlük
  `<rect x="72" y="155" width="56" height="65" rx="8" fill="#3498db"/>
   <rect x="68" y="152" width="64" height="12" rx="6" fill="#2980b9"/>
   <rect x="72" y="220" width="26" height="120" rx="5" fill="#2c3e50"/>
   <rect x="102" y="220" width="26" height="120" rx="5" fill="#2c3e50"/>
   <rect x="58" y="155" width="16" height="50" rx="6" fill="#3498db"/>

let seciliElbise=0;

function kat(isim,btn){
  document.querySelectorAll('.kat-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  ['elbise','sac','makyaj','aksesuar'].forEach(k=>{
    document.getElementById('panel-'+k).style.display=k===isim?'grid':'none';
  });
  if(isim==='sac'||isim==='makyaj'){
    document.getElementById('panel-'+isim).style.display='block';
  }
}

function elbiseSec(idx,el){
  seciliElbise=idx;
  document.querySelectorAll('#panel-elbise .secim-kart').forEach(x=>x.classList.remove('aktif'));
  el.classList.add('aktif');
  document.getElementById('elbise-katman').innerHTML=elbiseler[idx];
}

function sacRengi(renk,renk2,btn){
  document.querySelectorAll('#panel-sac .renk-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  ['sac-arka','sac-sol','sac-sag','sac-on'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.fill=renk;
  });
  const p=document.getElementById('percemYol');
  if(p){p.style.stroke=renk;}
}

function sacStil(stil,el){
  document.querySelectorAll('#panel-sac .secim-kart').forEach(x=>x.classList.remove('aktif'));
  el.classList.add('aktif');
  const sacSol=document.getElementById('sac-sol');
  const sacSag=document.getElementById('sac-sag');
  if(stil==='kisa'){
    sacSol.setAttribute('d','M55,100 Q45,130 50,160 Q52,170 58,168 L62,162 Q58,148 62,125 Q65,110 58,100Z');
    sacSag.setAttribute('d','M145,100 Q155,130 150,160 Q148,170 142,168 L138,162 Q142,148 138,125 Q135,110 142,100Z');
  }else if(stil==='bukle'){
    sacSol.setAttribute('d','M55,100 Q38,130 42,155 Q38,175 44,190 Q38,210 45,228 L52,224 Q48,208 54,190 Q60,172 55,152 Q52,130 60,100Z');
    sacSag.setAttribute('d','M145,100 Q162,130 158,155 Q162,175 156,190 Q162,210 155,228 L148,224 Q152,208 146,190 Q140,172 145,152 Q148,130 140,100Z');

}

function rujRengi(renk,renk2,btn){
  document.querySelectorAll('#panel-makyaj .renk-btn').slice(0,6).forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  const dudak=document.getElementById('dudak-katman');
  dudak.innerHTML=`
    <path d="M88,132 Q100,138 112,132" stroke="${renk2}" stroke-width="2" fill="none"/>
    <ellipse cx="100" cy="133" rx="12" ry="6" fill="${renk}" opacity="0.9"/>
    <path d="M88,133 Q100,128 112,133" fill="${renk2}" opacity="0.7"/>
  `;
}

function gozFari(renk,btn){
  const makyaj=document.getElementById('makyaj-katman');
  if(renk==='none'){
    makyaj.innerHTML='';
    return;
  }
  makyaj.innerHTML=`
    <ellipse cx="84" cy="96" rx="13" ry="6" fill="${renk}" opacity="0.4"/>
    <ellipse cx="116" cy="96" rx="13" ry="6" fill="${renk}" opacity="0.4"/>
  `;
}

function allakRengi(renk,btn){
  document.querySelectorAll('#panel-makyaj .renk-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  const allakSol=document.getElementById('allak-sol');
  const allakSag=document.getElementById('allak-sag');
  if(renk==='none'){
    allakSol.setAttribute('fill','transparent');
    allakSag.setAttribute('fill','transparent');
  }else{
    allakSol.setAttribute('fill',renk);
    allakSag.setAttribute('fill',renk);
  }
}

function aksesuarSec(idx,el){
  seciliAksesuar=idx;
  document.querySelectorAll('#panel-aksesuar .secim-kart').forEach(x=>x.classList.remove('aktif'));
  el.classList.add('aktif');
  const tacKatman=document.getElementById('tac-katman');
  const aksesuarKatman=document.getElementById('aksesuar-katman');
  if(idx===-1){
    tacKatman.innerHTML='';
    aksesuarKatman.innerHTML='';
    return;
  }
  // Taç vs diğerleri
  if(idx===0||idx===2||idx===3){
    tacKatman.innerHTML=aksesuarlar[idx];
    aksesuarKatman.innerHTML='';
  }else{
    aksesuarKatman.innerHTML=aksesuarlar[idx];
    tacKatman.innerHTML='';
  }
}

function temizle(){
  elbiseSec(0,document.querySelector('#panel-elbise .secim-kart'));
  document.getElementById('makyaj-katman').innerHTML='';
  document.getElementById('tac-katman').innerHTML='';
  document.getElementById('aksesuar-katman').innerHTML='';
  sacRengi('#8B4513','#7a3b10',document.querySelector('#panel-sac .renk-btn'));
  rujRengi('#ff6b9d','#ff4785',document.querySelector('#panel-makyaj .renk-btn'));
  allakRengi('rgba(255,150,170,0.35)',null);
  document.getElementById('allak-sol').setAttribute('fill','rgba(255,150,170,0.35)');
  document.getElementById('allak-sag').setAttribute('fill','rgba(255,150,170,0.35)');
}
